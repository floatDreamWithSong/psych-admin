name: Deploy Frontend to COS and Refresh CDN

on:
  push:
    branches:
      - main

env:
  CDN_ADMIN_DOMAIN: psych-admin.xhpolaris.com
  ADMIN_OUTPUT_DIR: dist

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Ensure pnpm (pnpm/action-setup)
        uses: pnpm/action-setup@v4

      - name: disable lefthook prepare
        run: |
          pnpm pkg delete scripts.prepare
      - name: Install dependencies & build
        run: |
          set -e
          pnpm install --frozen-lockfile
          pnpm build

      - name: Upload admin build artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: ${{ env.ADMIN_OUTPUT_DIR }}
          if-no-files-found: error

  deploy-admin:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download admin build artifact
        uses: actions/download-artifact@v4
        with:
          name: admin-dist
          path: ${{ env.ADMIN_OUTPUT_DIR }}

      - name: Upload admin artifact to COS
        uses: TencentCloud/cos-action@v1
        with:
          secret_id: ${{ secrets.COS_SECRET_ID }}
          secret_key: ${{ secrets.COS_SECRET_KEY }}
          cos_bucket: ${{ vars.COS_ADMIN_BUCKET }}
          cos_region: ${{ vars.COS_REGION }}
          local_path: ${{ env.ADMIN_OUTPUT_DIR }}
          remote_path: /
          clean: true

      - name: Refresh admin CDN
        uses: xh-polaris/tencent-cloud-cli-action@v1
        with:
          secret_id: ${{ secrets.COS_SECRET_ID }}
          secret_key: ${{ secrets.COS_SECRET_KEY }}
          region: ${{ vars.COS_REGION }}
          commands: >
            cdn PurgePathCache --cli-unfold-argument --Paths https://${{ env.CDN_ADMIN_DOMAIN }}/ --FlushType delete
          output_format: json
